<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jack AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
padding:20px 30px;
font-size:28px;
font-weight:bold;
}

#chat{
flex:1;
overflow-y:auto;
padding:40px;
max-width:900px;
width:100%;
margin:auto;
}

.user{
text-align:right;
margin:20px 0;
}

.user span{
background:#1f1f1f;
padding:14px 20px;
border-radius:24px;
display:inline-block;
}

.bot{
margin:20px 0;
font-size:24px;
line-height:1.5;
}

.input-wrap{
padding:20px;
}

.input-bar{
max-width:800px;
margin:auto;
background:#1a1a1a;
border-radius:35px;
display:flex;
align-items:center;
padding:10px 20px;
}

#msg{
flex:1;
background:none;
border:none;
outline:none;
color:white;
font-size:18px;
padding:12px;
}

.send{
background:none;
border:none;
color:white;
font-size:24px;
cursor:pointer;
}


@keyframes pulse{
0%{opacity:.3;}
50%{opacity:1;}
100%{opacity:.3;}
}

.thinking{
animation:pulse 1s infinite;
}

.welcome{

text-align:center;
margin-top:150px;
font-size:42px;
font-weight:600;
opacity:.9;
}
</style>
</head>

<body>

<div class="header">✨ Jack AI</div>

<div id="chat">
<div id="welcome" class="welcome">
How can I help you today?
</div>
</div>

<div class="input-wrap">
<div class="input-bar">
<input id="msg" placeholder="Ask Jack">
<button class="send" onclick="send()">➜</button>
</div>
</div>

<script>
async function send(){

const input=document.getElementById("msg");
const message=input.value;

if(!message.trim()) return;

document.getElementById("welcome").style.display="none";

const chat=document.getElementById("chat");

chat.innerHTML += `
<div class="user">
<span>${message}</span>
</div>
`;

chat.innerHTML += `
<div class="bot thinking" id="thinking">Jack is thinking...</div>
`;

chat.scrollTop=chat.scrollHeight;

const res=await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:message
})
});

const data=await res.json();

document.getElementById("thinking").remove();

chat.innerHTML += `
<div class="bot">
${data.reply}
</div>
`;

input.value="";
chat.scrollTop=chat.scrollHeight;
}

document.getElementById("msg").addEventListener("keydown",function(e){
if(e.key==="Enter"){
send();
}
});
</script>

</body>
</html>
