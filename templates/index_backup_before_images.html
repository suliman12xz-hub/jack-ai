<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jack AI</title>

<style>
*{box-sizing:border-box}
body{margin:0;background:#000;color:#fff;font-family:Arial,sans-serif;height:100vh;display:flex}

.sidebar{width:260px;background:#070707;border-right:1px solid #222;padding:18px;display:flex;flex-direction:column}
.logo{font-size:24px;font-weight:700;margin-bottom:25px}
.newchat{background:#111;border:1px solid #333;color:white;border-radius:12px;padding:12px;text-align:left;cursor:pointer}
.history{margin-top:20px;color:#aaa;font-size:14px;line-height:2}

.main{flex:1;display:flex;flex-direction:column}
.chat{flex:1;overflow-y:auto;padding:40px;max-width:900px;width:100%;margin:0 auto}
.welcome{text-align:center;margin-top:180px;font-size:38px;font-weight:700}

.message{margin:28px 0;line-height:1.6;font-size:18px}
.user{text-align:right}
.user span{background:#1f1f1f;padding:14px 20px;border-radius:22px;display:inline-block;max-width:70%;text-align:left}
.bot{max-width:720px;color:#f1f1f1}

.input-area{padding:20px}
.input-bar{max-width:760px;margin:auto;background:#1f1f1f;border-radius:32px;display:flex;align-items:center;padding:10px 16px}
#msg{flex:1;background:none;border:none;outline:none;color:white;font-size:18px;padding:12px}
button{background:none;border:none;color:white;font-size:24px;cursor:pointer;margin-left:10px}
.small{font-size:12px;color:#777;text-align:center;margin-top:8px}

@media(max-width:800px){
.sidebar{display:none}
.chat{padding:24px}
.welcome{font-size:30px}
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">✨ Jack AI</div>
  <button class="newchat" onclick="newChat()">+ New chat</button>
  <div class="history">
    <div>Chat 1</div>
    <div>Chat 2</div>
    <div>Chat 3</div>
  </div>
</div>

<div class="main">
  <div id="chat" class="chat">
    <div id="welcome" class="welcome">How can I help you today?</div>
  </div>

  <div class="input-area">
    <div class="input-bar">
      <input id="msg" placeholder="Ask anything">
      <button onclick="startVoice()">🎤</button>
      <button onclick="send()">➜</button>
    </div>
    <div class="small">Jack AI can make mistakes.</div>
  </div>
</div>

<script>
async function send(){
  const input=document.getElementById("msg");
  const message=input.value;
  if(!message.trim()) return;

  document.getElementById("welcome").style.display="none";

  const chat=document.getElementById("chat");

  chat.innerHTML += `<div class="message user"><span>${message}</span></div>`;
  chat.innerHTML += `<div class="message bot" id="thinking">Jack is thinking...</div>`;
  chat.scrollTop=chat.scrollHeight;

  const res=await fetch("/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:message})
  });

  const data=await res.json();
  document.getElementById("thinking").remove();

  chat.innerHTML += `<div class="message bot">${data.reply}</div>`;
  input.value="";
  chat.scrollTop=chat.scrollHeight;
}

function newChat(){
  document.getElementById("chat").innerHTML =
    '<div id="welcome" class="welcome">How can I help you today?</div>';
}

function startVoice(){
  alert("Voice later. Chat mode works now.");
}

document.getElementById("msg").addEventListener("keydown",function(e){
  if(e.key==="Enter"){send();}
});
</script>

</body>
</html>
