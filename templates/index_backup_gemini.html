<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jack AI</title>

<style>
body{
  margin:0;
  background:#0b0f19;
  color:white;
  font-family:Arial,sans-serif;
  height:100vh;
  display:flex;
  flex-direction:column;
}

.header{
  padding:20px;
  text-align:center;
  font-size:26px;
  font-weight:bold;
}

#welcome{
  text-align:center;
  margin-top:80px;
}

#chat{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.message{
  max-width:75%;
  padding:12px 16px;
  border-radius:20px;
  margin:10px 0;
  word-wrap:break-word;
}

.user{
  background:#3b82f6;
  margin-left:auto;
  text-align:right;
}

.bot{
  background:#222833;
  margin-right:auto;
}

.input-area{
  display:flex;
  padding:15px;
  background:#111827;
}

#msg{
  flex:1;
  padding:14px;
  border:none;
  border-radius:25px;
  font-size:16px;
}

button{
  margin-left:10px;
  width:60px;
  border:none;
  border-radius:25px;
  background:#3b82f6;
  color:white;
  font-size:18px;
}
</style>
</head>

<body>

<div class="header">Jack AI</div>

<div id="welcome">
  <h1>Hi Ahmed 👋</h1>
  <p>What's on your mind?</p>
</div>

<div id="chat"></div>

<div class="input-area">
  <input id="msg" placeholder="Ask Jack...">
  <button onclick="send()">➤</button>
</div>

<script>
async function send() {

  const input = document.getElementById("msg");
  const message = input.value;

  if(!message.trim()) return;

  document.getElementById("welcome").style.display="none";

  const chat = document.getElementById("chat");

  chat.innerHTML += `
    <div class="message user">${message}</div>
  `;

  const res = await fetch("/chat",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      message:message
    })
  });

  const data = await res.json();

  chat.innerHTML += `
    <div class="message bot">${data.reply}</div>
  `;

  input.value="";
  chat.scrollTop=chat.scrollHeight;
}

document.getElementById("msg").addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    send();
  }
});
</script>

</body>
</html>
